<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biluxe10 - Premium Learning LMS Player</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            font-family: 'Montserrat', sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100%;
            overflow: hidden;
        }

        /* 1. REAL SMOKE BACKGROUND ANIMATION SCREEN */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease;
            overflow: hidden;
        }

        /* Smoke particles canvas effect using CSS gradients */
        #intro-overlay::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%),
                        radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 40%);
            top: -50%;
            left: -50%;
            animation: smokeMoving 6s linear infinite;
            pointer-events: none;
        }

        @keyframes smokeMoving {
            0% { transform: translate(0, 0) rotate(0deg); filter: blur(10px); }
            50% { transform: translate(20px, 30px) rotate(180deg); filter: blur(25px); }
            100% { transform: translate(0, 0) rotate(360deg); filter: blur(10px); }
        }

        .smoke-text {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 12px;
            color: transparent;
            background: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(255,255,255,1) 50%, rgba(0,0,0,1) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: smokeTextEffect 3.5s linear forwards;
            filter: blur(5px);
        }

        @keyframes smokeTextEffect {
            0% { background-position: -200% 0; filter: blur(12px); opacity: 0; transform: scale(0.9); }
            15% { filter: blur(8px); opacity: 0.5; }
            50% { background-position: 0% 0; filter: blur(2px); opacity: 1; transform: scale(1.02); }
            100% { background-position: 200% 0; filter: blur(0px); opacity: 1; transform: scale(1); }
        }

        /* Main Dashboard Structure */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Playlist Navigation */
        .sidebar {
            width: 360px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 20;
        }

        .brand-header {
            padding: 24px;
            text-align: center;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }

        .brand-header h2 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #d4af37; /* Premium Gold */
        }

        .playlist-container {
            overflow-y: auto;
            flex-grow: 1;
            padding: 20px 15px;
        }

        .playlist-title {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 12px 0;
            line-height: 1.4;
            font-weight: 700;
        }

        .playlist-title:first-child {
            margin-top: 0;
        }

        .course-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            background: #161616;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease;
            border: 1px solid transparent;
            position: relative;
        }

        .course-item:hover {
            background: #1f1f1f;
        }

        .course-item.active {
            background: #1f1f1f;
            border-color: #d4af37;
        }

        .course-item.locked {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .video-index {
            font-size: 0.8rem;
            margin-right: 12px;
            color: #666;
            font-weight: bold;
        }

        .video-title {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 75%;
            color: #ddd;
        }

        .course-item.active .video-title {
            color: #fff;
        }

        .status-icon {
            position: absolute;
            right: 15px;
            font-size: 0.9rem;
        }

        /* Player Canvas Screen */
        .player-canvas {
            flex-grow: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* FIXED S-SHIELD LAYER: Absorbs pointer clicks only on edges, lets player inputs work safely */
        .shield-border-guard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none; /* Allows inner clicks to pass to player */
            border: 20px solid transparent; /* Blocks right-clicks or interactions near critical corners */
        }

        /* Floating Blur Branding Watermark (Blur Background + Text) */
        .blur-watermark {
            position: absolute;
            z-index: 18;
            pointer-events: none;
            font-size: 1.1rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            padding: 8px 16px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            animation: floatWatermark 20s infinite linear;
        }

        @keyframes floatWatermark {
            0% { top: 12%; left: 12%; }
            25% { top: 78%; left: 20%; }
            50% { top: 15%; left: 65%; }
            75% { top: 82%; left: 70%; }
            100% { top: 12%; left: 12%; }
        }

        #video-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Block Right Click globally -->

    <!-- 1. SMOKE ANIMATION INTRO SCREEN -->
    <div id="intro-overlay">
        <div class="smoke-text">BILUXE10</div>
    </div>

    <!-- MAIN INTERACTIVE APP INTERFACE -->
    <div class="app-container">
        
        <!-- SIDEBAR NAVIGATION -->
        <div class="sidebar">
            <div class="brand-header">
                <h2>BILUXE10 ELITE</h2>
            </div>
            
            <div class="playlist-container">
                <!-- COURSE PLAYLIST 1 -->
                <div class="playlist-title">Course 1: Sindhi & Gujarati Hand Embroidery</div>
                
                <!-- Unlocked First Demo Video -->
                <div class="course-item active" onclick="playVideo('mhI6btlyUyI', this, false)">
                    <span class="video-index">01</span>
                    <span class="video-title">Module 1: Introduction & Basic Demo</span>
                    <span class="status-icon" style="color: #4caf50;">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="playVideo('', this, true)">
                    <span class="video-index">02</span>
                    <span class="video-title">Module 2: Kutch Advanced Border</span>
                    <span class="status-icon" style="color: #f44336;">🔒</span>
                </div>

                <!-- COURSE PLAYLIST 2 -->
                <div class="playlist-title">Course 2: Basic Hand Embroidery for Beginners</div>
                
                <!-- Unlocked First Demo Video -->
                <div class="course-item" onclick="playVideo('Nyz3r_g2VpE', this, false)">
                    <span class="video-index">01</span>
                    <span class="video-title">Module 1: Basic Stitches Day 1 Demo</span>
                    <span class="status-icon" style="color: #4caf50;">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="playVideo('', this, true)">
                    <span class="video-index">02</span>
                    <span class="video-title">Module 2: Creative Patterns & Outlines</span>
                    <span class="status-icon" style="color: #f44336;">🔒</span>
                </div>
            </div>
        </div>

        <!-- PLAYER CORE CANVAS -->
        <div class="player-canvas">
            <!-- S-Shield Safety Borders Guard -->
            <div class="shield-border-guard"></div>
            
            <!-- Moving Transparent Blur Branding -->
            <div class="blur-watermark">BILUXE10 SECURE</div>

            <!-- Video Frame Container -->
            <div id="video-wrapper">
                <div id="player"></div>
            </div>
        </div>
    </div>

    <!-- YouTube API Engine -->
    <script>
        // Intro Control Logic
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                intro.style.opacity = '0';
                setTimeout(() => intro.style.display = 'none', 1000);
            }, 3500); // Smoke stays for 3.5 seconds
        });

        // Setup YouTube Iframe Async API
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let currentVideoId = 'mhI6btlyUyI'; // Default Start Video

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'controls': 1,            // Native controls working properly now!
                    'rel': 0,                 // No extra third-party recommendations
                    'modestbranding': 1,      // Clean player window
                    'disablekb': 1,           // Keyboard shortcuts disabled for safety
                    'fs': 1                   // Fullscreen allowed inside safe layer
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setPlaybackRate(1.1); // Force Default Speed to 1.1x
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                player.setPlaybackRate(1.1); // Auto-checks speed stays locked at 1.1x during playback
            }
        }

        // Live Module Switching
        function playVideo(videoId, element, isLocked) {
            if (isLocked) {
                alert("🔒 This Premium Module is Locked in Demo Mode.");
                return;
            }

            document.querySelectorAll('.course-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if (player && videoId) {
                player.loadVideoById(videoId);
                setTimeout(() => {
                    player.setPlaybackRate(1.1);
                }, 500);
            }
        }

        // Anti-Inspect Elements Protocol
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
                (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</body>
</html>
