<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biluxe10 Elite — Protected Player Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@500;700;800&family=Fraunces:ital,wght@0,700;1,400&family=Instrument+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* DESIGN MATCHED TO BILUXE10 CORE THEME VARIABLES */
        :root {
            --bg: #07070A;
            --bg2: #0D0D11;
            --bg3: #121216;
            --border: rgba(255,255,255,0.055);
            --border3: rgba(255,255,255,0.16);
            --gold: #C8A96E;
            --gold2: #E2C48A;
            --goldA: rgba(200,169,110,0.08);
            --text: #EBEBF0;
            --text2: #9898A8;
            --text3: #50505F;
            --font-display: 'Fraunces', Georgia, serif;
            --font-ui: 'Cabinet Grotesk', sans-serif;
            --font-mono: 'Instrument Mono', monospace;
            --ease-out: cubic-bezier(0.16,1,0.3,1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: var(--font-ui);
        }
        
        body, html {
            background: var(--bg);
            color: var(--text);
            height: 100%;
            overflow: hidden;
        }

        /* 1. CINEMATIC SMOKE INTRO OVERLAY */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.9s var(--ease-out);
            overflow: hidden;
        }

        #intro-overlay::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(200,169,110,0.04) 0%, transparent 60%);
            animation: smokeMove 5s linear infinite;
        }

        @keyframes smokeMove {
            0% { transform: translate(0,0) rotate(0deg); filter: blur(8px); }
            50% { transform: translate(10px, 20px) rotate(180deg); filter: blur(15px); }
            100% { transform: translate(0,0) rotate(360deg); filter: blur(8px); }
        }

        .smoke-text {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: transparent;
            background: linear-gradient(135deg, #fff, var(--gold), #fff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: smokeFade 3.5s var(--ease-out) forwards;
            filter: blur(4px);
        }

        @keyframes smokeFade {
            0% { background-position: -200% 0; opacity: 0; transform: scale(0.95); }
            50% { filter: blur(1px); opacity: 1; }
            100% { background-position: 200% 0; filter: blur(0); opacity: 1; transform: scale(1); }
        }

        /* TOP NAVIGATION BAR (For Mobile Viewport) */
        .top-navbar {
            display: none;
            height: 60px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            align-items: center;
            padding: 0 20px;
        }

        .hamburger-bars {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 22px;
            height: 14px;
            cursor: pointer;
        }

        .hamburger-bars span {
            display: block;
            height: 1.5px;
            width: 100%;
            background: var(--gold);
            border-radius: 1px;
            transition: 0.3s;
        }

        .top-navbar .brand-title {
            font-family: var(--font-display);
            margin-left: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--gold);
        }

        /* MAIN LAYOUT HARNESS */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* SIDEBAR MODULE TRACKS */
        .sidebar {
            width: 360px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 200;
            transition: transform 0.4s var(--ease-out);
        }

        .brand-header {
            padding: 24px;
            text-align: center;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .brand-header h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--gold);
        }

        .playlist-container {
            overflow-y: auto;
            flex-grow: 1;
            padding: 20px 16px;
        }

        .playlist-title {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin: 24px 0 12px 0;
            font-weight: 700;
        }

        .playlist-title:first-child { margin-top: 0; }

        .course-item {
            display: flex;
            align-items: center;
            padding: 14px 14px;
            background: var(--bg3);
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.2s;
        }

        .course-item:hover { background: var(--bg4); border-color: var(--border3); }

        .course-item.active {
            background: var(--goldA);
            border-color: var(--gold);
        }

        .course-item.locked {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .video-title {
            font-size: 0.82rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 80%;
            color: var(--text2);
        }

        .course-item.active .video-title { color: var(--text); }

        .status-icon {
            position: absolute;
            right: 16px;
            font-size: 0.85rem;
        }

        /* FULL SIZE CORE VIDEO CANVAS */
        .player-canvas {
            flex-grow: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #video-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Scale to clip native YouTube text/share buttons from top edges */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.15); 
            transform-origin: center center;
        }

        /* S-SHIELD TOUCH INTERCEPTOR AND GUARD */
        .player-shield-guard {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: transparent;
            /* Safe Zone margins allow touch signals to go through center for play/pause 
               but block dangerous redirect corners at edges */
            border-top: 55px solid transparent;
            border-bottom: 50px solid transparent;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
        }

        /* MOVING TRANSPARENT BLUR WATERMARK */
        .blur-watermark {
            position: absolute;
            z-index: 15;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: rgba(200, 169, 110, 0.25);
            letter-spacing: 0.15em;
            padding: 6px 14px;
            border-radius: 6px;
            background: rgba(7, 7, 10, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            animation: moveWatermark 25s infinite linear;
            white-space: nowrap;
            text-transform: uppercase;
        }

        @keyframes moveWatermark {
            0% { top: 15%; left: 10%; }
            25% { top: 75%; left: 50%; }
            50% { top: 25%; left: 70%; }
            75% { top: 80%; left: 15%; }
            100% { top: 15%; left: 10%; }
        }

        /* SYSTEM RESPONSIVE HU FIX FOR SCREEN SPACE */
        @media (max-width: 980px) {
            .top-navbar { display: flex; }
            .app-container { flex-direction: column; padding-top: 60px; }
            
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 290px;
                transform: translateX(-100%);
                box-shadow: 10px 0 40px rgba(0,0,0,0.8);
            }

            .sidebar.open { transform: translateX(0); }
            
            .player-canvas {
                width: 100%;
                height: calc(100vh - 60px);
            }

            iframe { transform: scale(1.25); } /* Aggressive crop adjustments on mobile */
            
            .player-shield-guard {
                border-top: 45px solid transparent;
                border-bottom: 45px solid transparent;
            }
        }
    </style>
</head>
<body>

    <!-- 1. SMOKE ANIMATION INTRO -->
    <div id="intro-overlay">
        <div class="smoke-text">BILUXE10</div>
    </div>

    <!-- 2. MOBILE TOP NAVIGATION HEADER -->
    <div class="top-navbar">
        <div class="hamburger-bars" onclick="toggleSidebarDrawer()">
            <span></span><span></span><span></span>
        </div>
        <div class="brand-title">BILUXE10 ELITE</div>
    </div>

    <!-- 3. MAIN TERMINAL HARNESS -->
    <div class="app-container">
        
        <!-- SIDEBAR DRAWER PANEL -->
        <div class="sidebar" id="appSidebar">
            <div class="brand-header">
                <h2>BILUXE10 ELITE</h2>
            </div>
            
            <div class="playlist-container">
                <!-- PLAYLIST 1 TRACK -->
                <div class="playlist-title">Course 1: Sindhi & Gujarati Embroidery</div>
                
                <div class="course-item active" onclick="executeTrackSwitch('mhI6btlyUyI', this, false)">
                    <span class="video-title">Module 1: Intro & Basic Demo</span>
                    <span class="status-icon" style="color: var(--gold);">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="executeTrackSwitch('', this, true)">
                    <span class="video-title">Module 2: Kutch Advanced Border</span>
                    <span class="status-icon" style="color: var(--text3);">🔒</span>
                </div>

                <!-- PLAYLIST 2 TRACK -->
                <div class="playlist-title">Course 2: Basic Hand Embroidery</div>
                
                <div class="course-item" onclick="executeTrackSwitch('Nyz3r_g2VpE', this, false)">
                    <span class="video-title">Module 1: Basic Stitches Day 1 Demo</span>
                    <span class="status-icon" style="color: var(--gold);">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="executeTrackSwitch('', this, true)">
                    <span class="video-title">Module 2: Creative Design Outlines</span>
                    <span class="status-icon" style="color: var(--text3);">🔒</span>
                </div>
            </div>
        </div>

        <!-- PROTECTED PLAYER PLAYER CANVAS -->
        <div class="player-canvas" id="canvasArea">
            <!-- S-Shield Border Guard Barrier Layout -->
            <div class="player-shield-guard"></div>
            
            <!-- Safe Blur Moving Branding Engine Token -->
            <div class="blur-watermark">🛡 BILUXE10 PROTECTED CORE</div>

            <!-- YouTube Inject Wrapper Core -->
            <div id="video-wrapper">
                <div id="player"></div>
            </div>
        </div>
    </div>

    <!-- S-SHIELD INFRASTRUCTURE SCRIPTS ENGINE -->
    <script>
        // Smooth Smoke Intro Unload Sequence
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                intro.style.opacity = '0';
                setTimeout(() => intro.style.display = 'none', 900);
            }, 3000); // Intro sequence running metrics
        });

        // Mobile Sidebar Switch Drawer Action Toggle
        function toggleSidebarDrawer() {
            document.getElementById('appSidebar').classList.toggle('open');
        }

        // Tap on player canvas safely hides drawer menu map
        document.getElementById('canvasArea').addEventListener('click', () => {
            document.getElementById('appSidebar').classList.remove('open');
        });

        // Async Loading YouTube Framework Scripts
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'mhI6btlyUyI', // Initial setup module index
                playerVars: {
                    'controls': 1,           // Keep player panel live for standard inputs
                    'rel': 0,                // Absolute zero recommendations context
                    'modestbranding': 1,     // Kill massive graphic branding flags
                    'disablekb': 1,          // Disable dangerous escape routes keys
                    'fs': 1                  // Native maximize scaling allowance matrix
                },
                events: {
                    'onReady': systemPlayerOnReady,
                    'onStateChange': systemPlayerStateMonitor
                }
            });
        }

        function systemPlayerOnReady(event) {
            event.target.setPlaybackRate(1.1); // Initialize target 1.1x speed scale matrix
        }

        function systemPlayerStateMonitor(event) {
            // Guard enforcement checking speed status on execution runs
            if (event.data == YT.PlayerState.PLAYING) {
                player.setPlaybackRate(1.1); 
            }
        }

        // Module Track Switching Logic Rules
        function executeTrackSwitch(videoId, element, isLocked) {
            if (isLocked) {
                alert("🔒 Module Locked! Upgrade your pack package access tier on the Biluxe10 dashboard to unlock.");
                return;
            }

            document.querySelectorAll('.course-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if (player && videoId) {
                player.loadVideoById(videoId);
                setTimeout(() => player.setPlaybackRate(1.1), 500);
            }

            // Collapse drawer frame maps after selection triggers on mobile viewports
            document.getElementById('appSidebar').classList.remove('open');
        }

        /* ═════════ HEAVY SECURITY LAYER ENFORCEMENT PROMPT BLOCKERS ═════════ */
        document.addEventListener('contextmenu', e => e.preventDefault()); // Stop global right clicks completely
        
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || 
                (e.ctrlKey && e.keyCode == 85)) {
                return false; // Blocks F12, Inspect view elements, view page source
            }
        };
    </script>
</body>
</html>
