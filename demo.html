<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biluxe10 - Premium Responsive Player</title>
    <!-- Google Fonts & FontAwesome for 3-Bars Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Montserrat', sans-serif;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            height: 100%;
            overflow: hidden;
        }

        /* SMOKE INTRO BACKGROUND ANIMATION */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .smoke-text {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 10px;
            color: transparent;
            background: linear-gradient(90deg, #000, #fff, #000);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: smokeEffect 3s linear forwards;
        }

        @keyframes smokeEffect {
            0% { background-position: -200% 0; filter: blur(10px); opacity: 0; }
            50% { filter: blur(2px); opacity: 1; }
            100% { background-position: 200% 0; filter: blur(0px); opacity: 1; }
        }

        /* MAIN APP STRUCTURE */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* FIXED TOP NAV BAR FOR MOBILE (Contains 3 Bars Button) */
        .top-navbar {
            display: none; /* Desktop par hidden */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            z-index: 100;
            align-items: center;
            padding: 0 20px;
        }

        /* 3 BARS HAMBURGER MENU BUTTON */
        .hamburger-menu {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            cursor: pointer;
        }

        .hamburger-menu span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: #d4af37; /* Gold Bars */
            border-radius: 3px;
            transition: 0.3s ease;
        }

        .top-navbar .brand-title {
            margin-left: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37;
        }

        /* SIDEBAR (PLAYLIST MENU) */
        .sidebar {
            width: 350px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.4s ease;
            z-index: 200;
        }

        .brand-header {
            padding: 24px;
            text-align: center;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }

        .brand-header h2 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: #d4af37;
        }

        .playlist-container {
            overflow-y: auto;
            flex-grow: 1;
            padding: 20px 15px;
        }

        .playlist-title {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 25px 0 12px 0;
            font-weight: 700;
        }

        .course-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            background: #161616;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .course-item.active {
            background: #1f1f1f;
            border-color: #d4af37;
        }

        .course-item.locked {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .video-title {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 75%;
            color: #ddd;
            margin-left: 10px;
        }

        .status-icon {
            position: absolute;
            right: 15px;
        }

        /* VIDEO PLAYER CANVAS */
        .player-canvas {
            flex-grow: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MOVING BLUR WATERMARK */
        .blur-watermark {
            position: absolute;
            z-index: 18;
            pointer-events: none;
            font-size: 1rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: floatWatermark 20s infinite linear;
        }

        @keyframes floatWatermark {
            0% { top: 15%; left: 15%; }
            25% { top: 75%; left: 20%; }
            50% { top: 20%; left: 60%; }
            75% { top: 80%; left: 65%; }
            100% { top: 15%; left: 15%; }
        }

        #video-wrapper {
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* MOBILE RESPONSIVE RULES (HUGE FIX FOR SCREEN SIZE) */
        @media (max-width: 768px) {
            .top-navbar {
                display: flex; /* Mobile par top bar dikhegi */
            }

            .app-container {
                flex-direction: column;
                padding-top: 60px; /* Space for top navbar */
            }

            /* Sidebar converts to a drawer hidden off-screen */
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 280px;
                transform: translateX(-100%); /* Completely hidden by default */
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }

            /* Class to slide-in sidebar */
            .sidebar.open {
                transform: translateX(0);
            }

            /* Video player takes full mobile width and height perfectly */
            .player-canvas {
                width: 100%;
                height: calc(100vh - 60px);
            }
            
            .blur-watermark {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- SMOKE ANIMATION INTRO -->
    <div id="intro-overlay">
        <div class="smoke-text">BILUXE10</div>
    </div>

    <!-- TOP HEADER BAR (Mobile Only) -->
    <div class="top-navbar">
        <div class="hamburger-menu" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="brand-title">BILUXE10 ELITE</div>
    </div>

    <div class="app-container">
        
        <!-- SIDEBAR (SLIDES OUT ON MOBILE WHEN 3-BARS CLICKED) -->
        <div class="sidebar" id="mobileSidebar">
            <div class="brand-header">
                <h2>BILUXE10 ELITE</h2>
            </div>
            
            <div class="playlist-container">
                <div class="playlist-title">Course 1: Sindhi & Gujarati</div>
                
                <div class="course-item active" onclick="playVideo('mhI6btlyUyI', this, false)">
                    <span class="video-title">Module 1: Introduction (Demo)</span>
                    <span class="status-icon">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="playVideo('', this, true)">
                    <span class="video-title">Module 2: Kutch Advanced</span>
                    <span class="status-icon">🔒</span>
                </div>

                <div class="playlist-title">Course 2: Basic Hand Embroidery</div>
                
                <div class="course-item" onclick="playVideo('Nyz3r_g2VpE', this, false)">
                    <span class="video-title">Module 1: Basic Day 1 (Demo)</span>
                    <span class="status-icon">🔓</span>
                </div>
                
                <div class="course-item locked" onclick="playVideo('', this, true)">
                    <span class="video-title">Module 2: Creative Patterns</span>
                    <span class="status-icon">🔒</span>
                </div>
            </div>
        </div>

        <!-- FULL-SCREEN VIDEO PLAYER -->
        <div class="player-canvas">
            <div class="blur-watermark">BILUXE10 SECURE</div>
            <div id="video-wrapper">
                <div id="player"></div>
            </div>
        </div>
    </div>

    <script>
        // Smoke overlay timeout
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                intro.style.opacity = '0';
                setTimeout(() => intro.style.display = 'none', 800);
            }, 3000);
        });

        // Toggle Sidebar Drawer (3 Bars Action)
        function toggleSidebar() {
            const sidebar = document.getElementById('mobileSidebar');
            sidebar.classList.toggle('open');
        }

        // Close sidebar when clicking outside on mobile
        document.querySelector('.player-canvas').addEventListener('click', () => {
            const sidebar = document.getElementById('mobileSidebar');
            if(sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });

        // YouTube API Setup
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'mhI6btlyUyI',
                playerVars: {
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'disablekb': 1
                },
                events: {
                    'onReady': (e) => e.target.setPlaybackRate(1.1),
                    'onStateChange': (e) => { if(e.data == YT.PlayerState.PLAYING) player.setPlaybackRate(1.1); }
                }
            });
        }

        function playVideo(videoId, element, isLocked) {
            if (isLocked) {
                alert("🔒 This Module is Locked!");
                return;
            }

            document.querySelectorAll('.course-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if (player && videoId) {
                player.loadVideoById(videoId);
                setTimeout(() => player.setPlaybackRate(1.1), 500);
            }

            // Mobile view par module select karte hi menu close ho jaye
            const sidebar = document.getElementById('mobileSidebar');
            if(sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        }

        // Security key blocker
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };
    </script>
</body>
</html>
