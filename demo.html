<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biluxe10 Learning Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

.logo{
font-size:42px;
font-weight:bold;
letter-spacing:3px;
z-index:2;
}

.smoke{
position:absolute;
width:250px;
height:250px;
border-radius:50%;
background:rgba(255,255,255,.08);
filter:blur(60px);
animation:smoke 5s linear infinite;
}

.smoke:nth-child(2){
left:30%;
animation-delay:1s;
}

.smoke:nth-child(3){
right:30%;
animation-delay:2s;
}

@keyframes smoke{
0%{
transform:translateY(120px) scale(.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-200px) scale(2);
opacity:0;
}
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
display:none;
}

.header{
padding:20px;
font-size:30px;
font-weight:bold;
border-bottom:1px solid #222;
margin-bottom:20px;
}

.layout{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
}

.sidebar{
background:#111;
border-radius:15px;
padding:15px;
}

.course-title{
font-size:20px;
margin-bottom:10px;
color:#00ff99;
}

.module{
padding:12px;
background:#181818;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.module:hover{
background:#252525;
}

.locked{
opacity:.45;
cursor:not-allowed;
}

.player-area{
background:#111;
border-radius:15px;
padding:20px;
position:relative;
}

.watermark{
position:absolute;
top:15px;
right:20px;
font-size:22px;
font-weight:bold;
opacity:.25;
z-index:5;
}

video{
width:100%;
border-radius:12px;
background:black;
}

.info{
margin-top:15px;
}

.info h2{
margin-bottom:8px;
}

.note{
margin-top:20px;
padding:10px;
background:#181818;
border-radius:10px;
color:#aaa;
}

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div id="intro">
<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>
<div class="logo">BILUXE10</div>
</div>

<div class="container" id="main">

<div class="header">
Biluxe10 Premium Learning Portal
</div>

<div class="layout">

<div class="sidebar">

<div class="course-title">
Course 1
</div>

<div class="module"
onclick="playVideo('demo1.mp4','Course 1 - Module 1')">
▶ Module 1 (Demo)
</div>

<div class="module locked">🔒 Module 2</div>
<div class="module locked">🔒 Module 3</div>
<div class="module locked">🔒 Module 4</div>

<br>

<div class="course-title">
Course 2
</div>

<div class="module"
onclick="playVideo('demo2.mp4','Course 2 - Module 1')">
▶ Module 1 (Demo)
</div>

<div class="module locked">🔒 Module 2</div>
<div class="module locked">🔒 Module 3</div>
<div class="module locked">🔒 Module 4</div>

</div>

<div class="player-area">

<div class="watermark">
BILUXE10
</div>

<video id="videoPlayer" controls>
<source src="demo1.mp4" type="video/mp4">
</video>

<div class="info">
<h2 id="moduleTitle">
Course 1 - Module 1
</h2>

<p>
Premium Skill-Based Learning Experience
</p>
</div>

<div class="note">
Demo Version • Remaining modules are locked.
</div>

</div>

</div>

</div>

<script>

document.addEventListener("contextmenu",e=>{
e.preventDefault();
});

window.onload=()=>{

setTimeout(()=>{

document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";

const video=document.getElementById("videoPlayer");

video.playbackRate=1.1;

},4000);

};

function playVideo(file,title){

const video=document.getElementById("videoPlayer");

video.src=file;
video.playbackRate=1.1;
video.load();
video.play();

document.getElementById("moduleTitle").innerText=title;

}

</script>

</body>
</html>
