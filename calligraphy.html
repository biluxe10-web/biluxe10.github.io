<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biluxe10 — Video Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       BILUXE10 DESIGN SYSTEM
       Palette: Obsidian · Gold · Ivory · Ash
    ═══════════════════════════════════════════ */
    :root {
      --obsidian:    #0a0a0c;
      --deep:        #111116;
      --surface:     #16161e;
      --panel:       #1c1c26;
      --border:      #2a2a38;
      --gold:        #c9a84c;
      --gold-dim:    #8a6e2e;
      --gold-glow:   rgba(201,168,76,0.18);
      --ivory:       #f0ead8;
      --ash:         #9090a0;
      --ash-dim:     #5a5a6e;
      --white:       #ffffff;

      --ff-display:  'Cormorant Garamond', serif;
      --ff-body:     'Inter', sans-serif;

      --radius:      6px;
      --radius-lg:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--obsidian);
      color: var(--ivory);
      font-family: var(--ff-body);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── LAYOUT ─────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* ── TOPBAR ──────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
      background: var(--deep);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }
    .topbar__logo {
      font-family: var(--ff-display);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .topbar__logo span {
      color: var(--ash);
      font-weight: 300;
    }
    .topbar__tag {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ash-dim);
    }
    .topbar__part-badge {
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.14em;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: var(--ff-body);
    }

    /* ── PLAYER AREA ─────────────────────────── */
    .player-area {
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 
      BILUXE10 BRANDING-HIDE TECHNIQUE:
      Scale iframe to 110% to push YouTube controls/logo off-edges,
      then use overlay masks to block top-left logo & top-right share,
      and a bottom-bar overlay to hide bottom controls.
      The iframe itself still plays; we just veil the chrome.
    */
    .player-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Scale iframe 110% centered — pushes YT chrome off edges */
    .player-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110%;
      height: 110%;
      transform: translate(-50%, -50%);
      border: none;
      pointer-events: all;
    }

    /* Top mask — hides YT logo top-left & more-options top-right */
    .mask-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--obsidian);
      z-index: 10;
      pointer-events: none;
    }

    /* Bottom mask — hides YT controls bar */
    .mask-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--obsidian);
      z-index: 10;
      pointer-events: none;
    }

    /* Thin golden frame accent */
    .player-frame {
      position: absolute;
      inset: 0;
      border: 1px solid var(--border);
      pointer-events: none;
      z-index: 11;
    }

    /* biluxe CUSTOM CONTROLS BAR */
    .controls-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: linear-gradient(0deg, var(--deep) 80%, transparent);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      z-index: 20;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--ash);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 6px;
      border-radius: var(--radius);
      transition: color 0.2s, background 0.2s;
    }
    .ctrl-btn:hover { color: var(--gold); background: var(--gold-glow); }
    .ctrl-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--ash-dim);
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }
    .progress-track {
      position: absolute;
      bottom: 56px; left: 0; right: 0;
      height: 2px;
      background: var(--border);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      transition: width 0.3s;
    }

    /* ── SIDEBAR ─────────────────────────────── */
    .sidebar {
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar__header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar__title {
      font-family: var(--ff-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--ivory);
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .sidebar__meta {
      font-size: 11px;
      color: var(--ash-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .sidebar__list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar__list::-webkit-scrollbar { width: 4px; }
    .sidebar__list::-webkit-scrollbar-track { background: var(--panel); }
    .sidebar__list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.18s, border-color 0.18s;
      position: relative;
    }
    .ep-item:hover {
      background: rgba(201,168,76,0.06);
      border-left-color: var(--gold-dim);
    }
    .ep-item.active {
      background: rgba(201,168,76,0.1);
      border-left-color: var(--gold);
    }
    .ep-num {
      font-family: var(--ff-display);
      font-size: 18px;
      font-weight: 300;
      color: var(--ash-dim);
      min-width: 26px;
      text-align: right;
      line-height: 1;
    }
    .ep-item.active .ep-num { color: var(--gold); }
    .ep-info { flex: 1; min-width: 0; }
    .ep-name {
      font-size: 13px;
      font-weight: 400;
      color: var(--ivory);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .ep-item.active .ep-name { color: var(--gold); }
    .ep-sub {
      font-size: 11px;
      color: var(--ash-dim);
      margin-top: 2px;
      letter-spacing: 0.06em;
    }
    .ep-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .ep-item.active .ep-dot { opacity: 1; }

    /* ── FOOTER STRIP ────────────────────────── */
    .sidebar__footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .footer-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }
    .footer-txt {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--ash-dim);
      text-transform: uppercase;
    }

    /* ── GLOW ACCENT ─────────────────────────── */
    .gold-glow-dot {
      position: absolute;
      bottom: -80px;
      right: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

  </style>
</head>
<body>
  <div class="layout">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar__logo">Biluxe<span>10</span></div>
      <div class="topbar__tag">Private Screening Series</div>
      <div class="topbar__part-badge" id="partBadge">Part 1 / 25</div>
    </header>

    <!-- PLAYER -->
    <main class="player-area">
      <div class="player-wrapper" id="playerWrapper">
        <iframe
          id="ytPlayer"
          src="https://www.youtube.com/embed/wUOPZmqWBS8?list=PLwUOPZmqWBS8&index=1&autoplay=0&rel=0&modestbranding=1&iv_load_policy=3&disablekb=0&controls=1&showinfo=0&fs=1&origin=null&enablejsapi=1"
          allowfullscreen
          allow="autoplay; encrypted-media; fullscreen"
          title="Biluxe10 Video Player"
        ></iframe>

        <!-- Branding masks -->
        <div class="mask-top"></div>
        <div class="mask-bottom"></div>
        <div class="player-frame"></div>
      </div>
    </main>

    <!-- SIDEBAR PLAYLIST -->
    <aside class="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__title">Full Series</div>
        <div class="sidebar__meta">25 Episodes · Step by Step</div>
      </div>

      <div class="sidebar__list" id="playlistList">
        <!-- Injected by JS -->
      </div>

      <div class="sidebar__footer">
        <div class="footer-line"></div>
        <div class="footer-txt">Biluxe10</div>
        <div class="footer-line" style="background: linear-gradient(90deg, transparent, var(--gold-dim));"></div>
      </div>
      <div class="gold-glow-dot"></div>
    </aside>

  </div>

  <script>
    // ═══════════════════════════════════════
    // BILUXE10 — SECURITY & CONTROLS
    // ═══════════════════════════════════════

    // Disable right-click everywhere
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Disable common keyboard shortcuts for save/inspect
    document.addEventListener('keydown', e => {
      if (
        (e.ctrlKey || e.metaKey) && ['s','u','a','c','p'].includes(e.key.toLowerCase())
      ) e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
      if (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase())) e.preventDefault();
    });

    // Prevent text selection
    document.addEventListener('selectstart', e => e.preventDefault());

    // ═══════════════════════════════════════
    // PLAYLIST DATA — 25 Parts
    // Each maps to index position in the YouTube playlist
    // ═══════════════════════════════════════
    const playlist = [
      { title: "Introduction & Overview",          sub: "Part 1  ·  Getting Started" },
      { title: "Core Concepts — Fundamentals",     sub: "Part 2  ·  Foundation" },
      { title: "Setup & Environment",              sub: "Part 3  ·  Installation" },
      { title: "First Project Walkthrough",        sub: "Part 4  ·  Hands-On" },
      { title: "Understanding the Structure",      sub: "Part 5  ·  Architecture" },
      { title: "Variables & Data Types",           sub: "Part 6  ·  Basics" },
      { title: "Control Flow & Logic",             sub: "Part 7  ·  Conditions" },
      { title: "Functions Deep Dive",              sub: "Part 8  ·  Reusability" },
      { title: "Working with Arrays",              sub: "Part 9  ·  Collections" },
      { title: "Objects & Prototypes",             sub: "Part 10 ·  OOP Intro" },
      { title: "Asynchronous Programming",         sub: "Part 11 ·  Async / Await" },
      { title: "Error Handling & Debugging",       sub: "Part 12 ·  Resilience" },
      { title: "Modules & Imports",                sub: "Part 13 ·  Code Splitting" },
      { title: "DOM Manipulation",                 sub: "Part 14 ·  Browser APIs" },
      { title: "Event Listeners & Delegation",     sub: "Part 15 ·  Interactivity" },
      { title: "Fetch API & HTTP Requests",        sub: "Part 16 ·  Networking" },
      { title: "Local Storage & State",            sub: "Part 17 ·  Persistence" },
      { title: "Building a Real Feature",          sub: "Part 18 ·  Project" },
      { title: "Styling & Responsive Design",      sub: "Part 19 ·  CSS Integration" },
      { title: "Performance Optimization",         sub: "Part 20 ·  Speed" },
      { title: "Testing Fundamentals",             sub: "Part 21 ·  Quality" },
      { title: "Deployment Basics",                sub: "Part 22 ·  Production" },
      { title: "Advanced Patterns",                sub: "Part 23 ·  Pro Techniques" },
      { title: "Review & Refactor",                sub: "Part 24 ·  Polish" },
      { title: "Final Project & Next Steps",       sub: "Part 25 ·  Completion" },
    ];

    // Playlist video IDs — using the known first video and sequential playlist positions
    // All embed using the same playlist, just changing index
    const BASE_VIDEO = 'wUOPZmqWBS8';
    const PLAYLIST_ID = 'PLwUOPZmqWBS8';

    let currentIndex = 0;

    const listEl = document.getElementById('playlistList');
    const playerEl = document.getElementById('ytPlayer');
    const badgeEl = document.getElementById('partBadge');

    function buildList() {
      listEl.innerHTML = '';
      playlist.forEach((ep, i) => {
        const item = document.createElement('div');
        item.className = 'ep-item' + (i === 0 ? ' active' : '');
        item.innerHTML = `
          <div class="ep-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="ep-info">
            <div class="ep-name">${ep.title}</div>
            <div class="ep-sub">${ep.sub}</div>
          </div>
          <div class="ep-dot"></div>
        `;
        item.addEventListener('click', () => loadEpisode(i));
        listEl.appendChild(item);
      });
    }

    function loadEpisode(index) {
      currentIndex = index;

      // Update iframe src with new playlist index
      const newSrc = `https://www.youtube.com/embed/${BASE_VIDEO}?list=${PLAYLIST_ID}&index=${index + 1}&autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&controls=1&showinfo=0&fs=1&enablejsapi=1`;
      playerEl.src = newSrc;

      // Update sidebar active state
      document.querySelectorAll('.ep-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      // Scroll active item into view
      const activeEl = listEl.querySelectorAll('.ep-item')[index];
      if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Update badge
      badgeEl.textContent = `Part ${index + 1} / 25`;
    }

    buildList();
  </script>
</body>
</html>
