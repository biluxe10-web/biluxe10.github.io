:root {
    --bg: #07070A; --bg2: #0D0D12; --bg3: #121218; --bg4: #18181F;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--fb); overflow-x: hidden; line-height: 1.6; }
button, input, textarea { font-family: inherit; }

/* LOADING GUARD */
#guard { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity .5s; }
.g-logo { font-family: var(--fd); font-size: 3rem; font-weight: 900; color: var(--gold); }
.g-spin { width: 35px; height: 35px; border: 3px solid rgba(200,169,110,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SIDEBAR */
#sb { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sbw); background: var(--bg2); border-right: 1px solid var(--border); z-index: 500; transition: width .3s cubic-bezier(0.16,1,0.3,1); overflow: hidden; }
#sb:hover { width: var(--sbx); }
.sb-item { display: flex; align-items: center; gap: 20px; padding: 18px 22px; cursor: pointer; color: var(--t2); text-decoration: none; transition: 0.2s; white-space: nowrap; border: none; background: none; width: 100%; text-align: left; }
.sb-item:hover, .sb-item.on { background: rgba(200,169,110,0.08); color: var(--gold); }
.sb-ic { font-size: 1.3rem; min-width: 25px; text-align: center; }
.sb-lbl { font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.2s; }
#sb:hover .sb-lbl { opacity: 1; }

/* MAIN CONTENT */
#main { margin-left: var(--sbw); min-height: 100vh; display: flex; flex-direction: column; }
.topbar { height: var(--nav); padding: 0 30px; background: rgba(7,7,10,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 400; }
.pg { display: none; padding: 40px; animation: slideUp 0.4s ease; }
.pg.on { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* GRID & CARDS */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 25px; transition: 0.3s; cursor: pointer; position: relative; }
.card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
.card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
.card-ic { font-size: 2.5rem; margin-bottom: 15px; }
.card-title { font-family: var(--fd); font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
.card-price { font-family: var(--fm); font-size: 0.75rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 12px; }
.card-desc { font-size: 0.85rem; color: var(--t2); }

/* COURSE VIEWER */
#cv { display: none; grid-template-columns: 1fr 350px; height: calc(100vh - var(--nav)); }
.cv-vid { padding: 30px; overflow-y: auto; background: var(--bg); }
.cv-side { background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; }
.vid-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 25px; }
iframe { width: 100%; height: 100%; border: none; }
.mod-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 0.85rem; transition: 0.2s; }
.mod-item:hover, .mod-item.active { background: rgba(200,169,110,0.1); color: var(--gold); }
.mod-idx { width: 28px; height: 28px; background: var(--bg4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
.mod-item.active .mod-idx { background: var(--gold); color: var(--ink); }

/* AI TUTOR */
.tutor-ui { height: calc(100vh - 140px); display: flex; flex-direction: column; max-width: 1000px; margin: 0 auto; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }

.m-user { align-self: flex-end; background: var(--gold); color: #000; padding: 15px 20px; border-radius: 18px 18px 2px 18px; max-width: 85%; font-size: 0.9rem; font-weight: 600; }
.chat-input { padding: 20px; background: var(--bg3); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; }
#msgInp { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; color: #fff; outline: none; resize: none; max-height: 150px; }
.chat-btn { width: 45px; height: 45px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.btn-send { background: var(--gold); color: #000; }
.btn-file { background: var(--bg4); color: var(--t2); }

@media (max-width: 900px) {

    #sb { width: 0; transform: translateX(-100%); }

        document.getElementById('userTier').innerText = `TIER: ₹${userTier}`;
        initUI();
    }
    document.getElementById('guard').style.opacity = '0';
    setTimeout(() => document.getElementById('guard').style.display='none', 500);
});

function initUI() {
    renderBundles();
    renderSpecial();
    renderChat();
}

// NAVIGATION
function nav(pg) {
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
    document.getElementById('cv').style.display = 'none';
    document.getElementById('pg-'+pg).classList.add('on');
    document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
    const titles = { bundles: "Course Bundles", special: "Special Courses", tutor: "AI Tutor" };
    document.getElementById('pgTitle').innerText = titles[pg];
}

// BUNDLES RENDER
function renderBundles() {
    const grid = document.getElementById('bundleGrid');
    grid.innerHTML = BUNDLES.map(b => {
        const locked = userTier < b.price;
        return `
            <div class="card ${locked?'locked':''}" onclick="${locked?'upgrade()':`showBundleCourses('${b.name}')`}">
                <div class="card-ic">${b.ic}</div>
                <div class="card-title">${b.name}</div>
                <div class="card-price">ACCESS: ₹${b.price}+</div>
                <div class="card-desc">${b.desc}</div>
            </div>
        `;
    }).join('');
}

function showBundleCourses(bundleName) {
    const bundle = BUNDLES.find(b => b.name === bundleName);
    const grid = document.getElementById('courseList');
    grid.innerHTML = bundle.courses.map(cid => {
        const c = ALL_COURSES[cid];
        return `
            <div class="card" onclick="playCourse('${cid}', 'all')">
                <div class="card-title">${c.title}</div>
                <div class="card-desc">Click to start modules.</div>
            </div>
        `;
    }).join('');
    nav('courses');
    document.getElementById('pgTitle').innerText = bundleName;
}

// SPECIAL COURSES RENDER
function renderSpecial() {
    const grid = document.getElementById('specialGrid');
    grid.innerHTML = Object.keys(SPECIAL_COURSES).map(id => {
        const c = SPECIAL_COURSES[id];
        return `
            <div class="card" onclick="playCourse('${id}', 'special')">
                <div class="card-ic">${c.ic}</div>
                <div class="card-title">${c.title}</div>
                <div class="card-desc">${c.desc}</div>
            </div>
        `;
    }).join('');
}

// PLAYER LOGIC
function playCourse(id, type) {
    const course = (type === 'special') ? SPECIAL_COURSES[id] : ALL_COURSES[id];
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
    document.getElementById('cv').style.display = 'grid';
    document.getElementById('vidTitle').innerText = course.title;
    
    const list = document.getElementById('modList');
    
    // If it's a playlist or a multi-part special
    if(course.pl) {
        list.innerHTML = `<div class="mod-item active" onclick="loadVideo('${course.pl}', true)">
            <div class="mod-idx">▶</div>
            <div>Full Playlist</div>
        </div>`;
        loadVideo(course.pl, true);
    } else if (course.modules) {
        list.innerHTML = course.modules.map((m, i) => `
            <div class="mod-item ${i===0?'active':''}" onclick="loadVideo('${m.yt}', false, this)">
                <div class="mod-idx">${i+1}</div>
                <div>${m.title}</div>
            </div>
        `).join('');
        loadVideo(course.modules[0].yt, false);
    } else {
        list.innerHTML = `<div class="mod-item active">
            <div class="mod-idx">1</div>
            <div>Full Course Video</div>
        </div>`;
        loadVideo(course.yt, false);
    }
}

function loadVideo(vid, isPl, el) {
    const player = document.getElementById('player');
    const url = isPl ? `https://www.youtube.com/embed/videoseries?list=${vid}` : `https://www.youtube.com/embed/${vid}`;
    player.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    if(el) {
        document.querySelectorAll('.mod-item').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
    }
}

// AI TUTOR LOGIC
async function sendMsg() {
    const inp = document.getElementById('msgInp');
    const text = inp.value.trim();
    if(!text) return;

    inp.value = '';
    inp.style.height = 'auto';
    
    addMsg(text, 'user');
    
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: text }] }]
            })
        });
        const data = await response.json();
        const aiReply = data.candidates[0].content.parts[0].text;
        addMsg(aiReply, 'bot');
    } catch (e) {
        addMsg("Error connecting to AI. Please check your key or connection.", 'bot');
    }
}

function addMsg(text, role) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = role === 'user' ? 'm-user' : 'm-bot';
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    
    chatHistory.push({ role, text });
    localStorage.setItem('b10_chat', JSON.stringify(chatHistory));
}

function renderChat() {
    const box = document.getElementById('chatBox');
    box.innerHTML = chatHistory.map(m => `
        <div class="${m.role==='user'?'m-user':'m-bot'}">${m.text}</div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

function uploadFile(input) {
    if(input.files[0]) {
        addMsg(`Uploaded file: ${input.files[0].name}`, 'user');
        setTimeout(() => addMsg("I've received your file. How can I help you with its contents?", 'bot'), 1000);
    }
}

function upgrade() {
    alert("This bundle is locked. Please upgrade your plan from the dashboard.");
}

function toggleSb() {
    // Optional: for mobile manual toggle
}
