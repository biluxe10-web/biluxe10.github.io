function generatePDFs(courseTitle) {
    const topics = ['Introduction', 'Core Concepts', 'Advanced Topics', 'Best Practices', 'Case Studies', 'Workbook', 'Quick Reference', 'Exam Guide'];
    return topics.map((t, i) => ({ id: i+1, title: `${courseTitle} - ${t}`, icon: '📘', size: `${Math.floor(Math.random()*3)+1}.2 MB` }));
}
Object.values(COURSES_DATA).forEach(cat => {

});

// YouTube embed helper
function getEmbedUrl(url) {
    if (!url) return '';
    let id = '';
    if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1]?.split('?')[0] || '';
    else if (url.includes('v=')) id = url.split('v=')[1]?.split('&')[0] || '';
    else if (url.includes('playlist?list=')) {
        let listId = url.split('list=')[1]?.split('&')[0] || '';
        if (listId) return `https://www.youtube.com/embed/videoseries?list=${listId}&rel=0&modestbranding=1`;
    }
    if (id) return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&showinfo=0&controls=1`;
    return '';
}

function getCourseProgress(cid) {
    const wd = WATCH_DATA[cid];
    if (!wd) return 0;
    let total = 0;
    for (let cat of Object.values(COURSES_DATA)) {
        let course = cat.courses.find(c => c.id === cid);
        if (course) { total = course.modules.length; break; }
    }
    return total ? Math.round(((wd.done || []).length / total) * 100) : 0;
}

function isModuleDone(cid, mid) { return (WATCH_DATA[cid]?.done || []).includes(mid); }

function saveProgress(cid, mid) {
    if (!WATCH_DATA[cid]) WATCH_DATA[cid] = { done: [] };
    if (!WATCH_DATA[cid].done.includes(mid)) WATCH_DATA[cid].done.push(mid);
    WATCH_DATA[cid].lastModule = mid;
}

function playModule(moduleId, idx) {
    if (!CURRENT_COURSE) return;
    const module = CURRENT_COURSE.modules[idx];
    if (!module) return;
    CURRENT_MODULE = module;
    
    // Update active state
    document.querySelectorAll('.module-item').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.module-item');
    if (items[idx]) items[idx].classList.add('active');
    
    const embedUrl = getEmbedUrl(module.url);
    const frame = document.getElementById('ytFrame');
    if (frame && embedUrl) frame.src = embedUrl;
    else if (frame) frame.src = '';
    
    // Update mark button text
    const markBtn = document.getElementById('markBtn');
    if (markBtn) markBtn.textContent = isModuleDone(CURRENT_COURSE.id, module.id) ? '✓ Already Completed' : '✓ Mark Complete';
}

function markCurrentComplete() {
    if (!CURRENT_COURSE || !CURRENT_MODULE) { toast('⚠', 'Select a module first'); return; }
    if (isModuleDone(CURRENT_COURSE.id, CURRENT_MODULE.id)) { toast('✓', 'Module already completed!'); return; }
    
    saveProgress(CURRENT_COURSE.id, CURRENT_MODULE.id);
    
    // Update UI
    const items = document.querySelectorAll('.module-item');
    for (let i = 0; i < CURRENT_COURSE.modules.length; i++) {
        if (CURRENT_COURSE.modules[i].id === CURRENT_MODULE.id) {
            const el = items[i];
            if (el) {
                el.classList.add('done');
                const numDiv = el.querySelector('.mi-num');
                if (numDiv) numDiv.textContent = '✓';
            }
            break;
        }
    }
    
    const doneCount = (WATCH_DATA[CURRENT_COURSE.id]?.done || []).length;
    const totalMods = CURRENT_COURSE.modules.length;
    const pct = Math.round(doneCount / totalMods * 100);
    const progFill = document.getElementById('courseProgFill');
    if (progFill) progFill.style.width = pct + '%';
    
    const sidebarHd = document.querySelector('.cv-sb-hd');
    if (sidebarHd) sidebarHd.textContent = `📋 Modules · ${doneCount}/${totalMods} done`;
    
    toast('✅', `"${CURRENT_MODULE.title}" completed!`);
    
    if (doneCount === totalMods) {
        toast('🎉', 'Congratulations! Course completed! Take the exam to earn your certificate.', 5000);
    }
    
    const markBtn = document.getElementById('markBtn');
    if (markBtn) markBtn.textContent = '✓ Already Completed';
}

// Exam functionality
function startExamForCourse() {
    if (!CURRENT_COURSE) return;
    const doneCount = (WATCH_DATA[CURRENT_COURSE.id]?.done || []).length;
    const totalMods = CURRENT_COURSE.modules.length;
    const pct = Math.round(doneCount / totalMods * 100);
    if (pct < 70) { toast('⚠', `Complete ${100-pct}% more of the course to take the exam.`); return; }
    
    const examQs = [
        { q: `What is the main focus of ${CURRENT_COURSE.title}?`, opts: ['Practical skills and real-world application', 'Only theory', 'Memorization', 'None of these'], ans: 0 },
        { q: 'Which approach leads to the best learning outcomes?', opts: ['Consistent practice', 'Watching once', 'Skipping difficult topics', 'Only reading'], ans: 0 },
        { q: 'What should you do after completing a module?', opts: ['Practice and apply', 'Move on without practice', 'Forget it', 'Skip to next'], ans: 0 },
        { q: 'How can you demonstrate your learning?', opts: ['Build projects', 'Just watch videos', 'Take notes only', 'Share certificates'], ans: 0 },
        { q: 'What is the value of hands-on projects?', opts: ['Reinforces learning and builds portfolio', 'Wastes time', 'Optional only', 'Not important'], ans: 0 }
    ];
    
    examState = { questions: examQs, answers: {}, courseId: CURRENT_COURSE.id };
    
    document.getElementById('courseListView').style.display = 'block';
    document.getElementById('playerView').style.display = 'none';
    document.getElementById('tab-courses').innerHTML = `
        <div class="exam-wrap">
            <div style="font-family:var(--fd);font-size:1.1rem;font-weight:700">📝 ${CURRENT_COURSE.title} - Exam</div>
            <div class="exam-prog-bar"><div class="exam-prog-fill" id="examProg" style="width:0%"></div></div>
            <div id="examQs"></div>
            <button class="btn-g" onclick="submitExam()" style="margin-top:16px">Submit Exam</button>
            <button class="btn-sm" onclick="location.reload()">Cancel</button>
        </div>`;
    
    const qDiv = document.getElementById('examQs');
    qDiv.innerHTML = examQs.map((q, i) => `
        <div class="exam-q">
            <div class="exam-q-text">${q.q}</div>
            <div class="exam-opts">${q.opts.map((o, j) => `<div class="exam-opt" onclick="selectExamOption(${i}, ${j})">${String.fromCharCode(65+j)}. ${o}</div>`).join('')}</div>
        </div>
    `).join('');
}

function selectExamOption(qi, oi) {
    examState.answers[qi] = oi;
    const opts = document.querySelectorAll(`#examQs .exam-q:nth-child(${qi+1}) .exam-opt`);
    opts.forEach(opt => opt.classList.remove('sel'));
    opts[oi].classList.add('sel');
    const pct = Math.round(Object.keys(examState.answers).length / examState.questions.length * 100);
    document.getElementById('examProg').style.width = pct + '%';
}

function submitExam() {
    if (Object.keys(examState.answers).length < examState.questions.length) {
        toast('⚠', `Answer all ${examState.questions.length} questions first.`);
        return;
    }
    let correct = 0;
    examState.questions.forEach((q, i) => { if (examState.answers[i] === q.ans) correct++; });
    const score = Math.round(correct / examState.questions.length * 100);
    const passed = score >= 60;
    
    if (passed && !CERT_DATA[examState.courseId]) {
        const cert = { courseId: examState.courseId, courseName: CURRENT_COURSE.title, studentName: U.name, score, certId: 'B10-' + Date.now().toString(36).toUpperCase() };
        CERT_DATA[examState.courseId] = cert;
        renderCertificates();
    }
    
    document.getElementById('tab-courses').innerHTML = `
        <div style="text-align:center;padding:40px">
            <div style="font-size:3rem">${passed ? '🎉' : '😔'}</div>
            <div style="font-family:var(--fd);font-size:1.3rem;font-weight:700;color:${passed ? 'var(--green)' : 'var(--red)'}">${passed ? 'You Passed!' : 'Not Passed'}</div>
            <div style="font-size:1.2rem;color:var(--gold);margin:10px 0">Score: ${score}%</div>
            <div style="margin-bottom:20px">${passed ? '🏆 Certificate earned! Check Certificates tab.' : 'Need 60% to pass. Review the course and try again.'}</div>
            <button class="btn-g" onclick="location.reload()">← Back to Courses</button>
        </div>`;
    if (passed) renderCertificates();
}

async function sendChat() {

    const msg = inp.value.trim();

    inp.value = '';
    const msgsDiv = document.getElementById('chatMsgs');
    msgsDiv.innerHTML += `<div class="chat-bubble user">${msg.replace(/</g, '&lt;')}</div>`;
    chatHistory.push({ role: 'user', content: msg });
    msgsDiv.innerHTML += `<div class="chat-bubble ai">🤔 Thinking...</div>`;
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
    
    setTimeout(() => {
        const last = msgsDiv.lastChild;

This is a demo response. In production, this would connect to Groq AI (Llama 3) to give you detailed, helpful answers about your courses.

**Key tips for ${CURRENT_COURSE?.title || 'your course'}:**

Keep up the great work! 🚀`;
